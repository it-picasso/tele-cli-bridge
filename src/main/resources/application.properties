server.port=${SERVER_PORT:8191}
spring.application.name=TeleCliBridge

logging.level.pro.xpst=${LOG_LEVEL:DEBUG}

# Provider model allowlists (comma-separated; rendered as union in /model keyboard)
pro.xpst.gemini.models=${GEMINI_MODELS:gemini-2.5-flash,gemini-2.5-flash-lite}
pro.xpst.claude.models=${CLAUDE_MODELS:claude-sonnet-4-6,claude-haiku-4-5}

# Default models per provider
pro.xpst.gemini.default-model=${GEMINI_DEFAULT_MODEL:gemini-2.5-flash-lite}
pro.xpst.claude.default-model=${CLAUDE_DEFAULT_MODEL:claude-haiku-4-5}

# Default provider for new chats: gemini or claude
pro.xpst.default.provider=${DEFAULT_PROVIDER:claude}

# CLI binaries (override if not on PATH)
pro.xpst.cli.gemini.binary=${GEMINI_BINARY:gemini}
pro.xpst.cli.claude.binary=${CLAUDE_BINARY:claude}
pro.xpst.cli.timeout-seconds=${CLI_TIMEOUT_SECONDS:120}

# Per-CLI working directories (anchor for CLAUDE.md / GEMINI.md security instructions).
# Both folders MUST exist and contain their respective security-instructions file.
pro.xpst.cli.claude.workdir=${CLAUDE_WORKDIR:./claude-cli}
pro.xpst.cli.gemini.workdir=${GEMINI_WORKDIR:./gemini-cli}

# Claude reasoning effort. Values: low | medium | high | xhigh | max (or empty for CLI default).
pro.xpst.cli.claude.effort=${CLAUDE_EFFORT:low}

# Allowed built-in tools for the CLIs. Comma-separated. Empty = disable all (default — strict lockdown).
# Enabling tools widens the threat surface; see README "Security model" before turning on.
# Examples:  CLAUDE_TOOLS=WebSearch        GEMINI_TOOLS=google_web_search
pro.xpst.cli.claude.tools=${CLAUDE_TOOLS:}
pro.xpst.cli.gemini.tools=${GEMINI_TOOLS:}

# Telegram (BOT_NAME, BOT_TOKEN are required — no defaults)
pro.xpst.telegram.bot.username=${BOT_NAME}
pro.xpst.telegram.bot.token=${BOT_TOKEN}

# Comma-separated list of allowed user IDs for **private DMs only**. Empty = all users allowed.
# Group access is controlled separately by `groups.allowed` — any group member can talk to the bot in an allowed group.
pro.xpst.telegram.bot.users.allowed=${BOT_USERS_ALLOWED:}

# Comma-separated list of admin user IDs (can use /model). Empty = no one is admin (locks /model down by default).
pro.xpst.telegram.bot.users.admin=${BOT_USERS_ADMIN:}

# Comma-separated list of allowed group/supergroup chat IDs (negative numbers in Telegram). Empty = all groups allowed.
pro.xpst.telegram.bot.groups.allowed=${BOT_GROUPS_ALLOWED:}

# Comma-separated list of trigger phrases for group chats (case-insensitive). Empty = require @mention only.
# In private chats, no trigger phrase is required.
pro.xpst.telegram.bot.trigger.phrases=${BOT_TRIGGER_PHRASES:}

# Conversation history expiration (minutes)
pro.xpst.conversation.expiration=${CONVERSATION_EXPIRATION:60}
